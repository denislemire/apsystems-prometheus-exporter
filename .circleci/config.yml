# CircleCI Server (EhWS) — build and push to internal Zot registry.
#
# Machine executor: KubeVirt linux.medium (ubuntu-2404) — docker runs on the VM.
# Registry auth: 1Password CLI + service account (see ehws-infra docs/CIRCLECI_1PASSWORD_SECRETS.md).
# Note: onepassword/secrets orb is unavailable on self-hosted orb registry; install op directly.
#
# Project env (CircleCI UI, not in Git): OP_SERVICE_ACCOUNT_TOKEN
version: 2.1

jobs:
  build-push-image:
    machine:
      image: ubuntu-2404:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install 1Password CLI
          command: |
            set -euo pipefail
            curl -sSLo /tmp/op.deb https://downloads.1password.com/linux/debian/amd64/stable/1password-cli-amd64-latest.deb
            sudo dpkg -i /tmp/op.deb
            op --version
      - run:
          name: Build and push image to Zot
          command: |
            set -euo pipefail
            : "${OP_SERVICE_ACCOUNT_TOKEN:?Set OP_SERVICE_ACCOUNT_TOKEN on the CircleCI project}"

            REGISTRY="registry.ehws.generic.business"
            IMAGE="${REGISTRY}/apsystems-exporter"
            ZOT_USERNAME="$(op read 'op://EhWS Secrets/Registry EHWS - Zot htpasswd/username')"
            ZOT_PASSWORD="$(op read 'op://EhWS Secrets/Registry EHWS - Zot htpasswd/password')"

            printf '%s' "${ZOT_PASSWORD}" \
              | docker login "${REGISTRY}" -u "${ZOT_USERNAME}" --password-stdin

            if [ -n "${CIRCLE_TAG:-}" ]; then
              TAG="${CIRCLE_TAG}"
              VERSION="${TAG#v}"
              MAJOR_MINOR="$(echo "${VERSION}" | cut -d. -f1,2)"
              TAGS=(
                "${IMAGE}:${TAG}"
                "${IMAGE}:${VERSION}"
                "${IMAGE}:${MAJOR_MINOR}"
                "${IMAGE}:sha-${CIRCLE_SHA1:0:7}"
              )
              BUILD_VERSION="${TAG}"
            else
              TAGS=(
                "${IMAGE}:sha-${CIRCLE_SHA1:0:7}"
                "${IMAGE}:branch-${CIRCLE_BRANCH//\//-}"
              )
              BUILD_VERSION="dev-${CIRCLE_SHA1:0:7}"
            fi

            build_args=(--build-arg "VERSION=${BUILD_VERSION}")
            for ref in "${TAGS[@]}"; do
              build_args+=(-t "${ref}")
            done
            docker build "${build_args[@]}" .

            for ref in "${TAGS[@]}"; do
              docker push "${ref}"
            done

workflows:
  build:
    jobs:
      - build-push-image:
          filters:
            branches:
              only:
                - feat/circleci-kubevirt-zot-build
                - main
            tags:
              ignore: /.*/

  release:
    jobs:
      - build-push-image:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
