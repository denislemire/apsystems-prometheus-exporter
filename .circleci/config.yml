# CircleCI Server (OAuth) — circle.ehws.generic.business
# Builds and pushes ghcr.io/denislemire/apsystems-prometheus-exporter on version tags (v*).
#
# Context: apsystems-github-publish
#   GITHUB_USERNAME — GitHub account for GHCR login
#   GITHUB_TOKEN    — PAT with repo + write:packages
version: 2.1

jobs:
  release-image:
    docker:
      - image: cimg/base:2024.11
    resource_class: medium
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Log in to GHCR
          command: |
            set -euo pipefail
            : "${GITHUB_USERNAME:?Set GITHUB_USERNAME in the apsystems-github-publish context}"
            : "${GITHUB_TOKEN:?Set GITHUB_TOKEN in the apsystems-github-publish context}"
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_USERNAME}" --password-stdin
      - run:
          name: Build and push release image
          command: |
            set -euo pipefail
            TAG="${CIRCLE_TAG:?release job requires a git tag}"
            VERSION="${TAG#v}"
            MAJOR_MINOR="$(echo "${VERSION}" | cut -d. -f1,2)"
            IMAGE="ghcr.io/denislemire/apsystems-prometheus-exporter"

            docker build \
              --build-arg "VERSION=${TAG}" \
              -t "${IMAGE}:${VERSION}" \
              -t "${IMAGE}:${MAJOR_MINOR}" \
              -t "${IMAGE}:sha-${CIRCLE_SHA1}" \
              .

            docker push "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:${MAJOR_MINOR}"
            docker push "${IMAGE}:sha-${CIRCLE_SHA1}"

workflows:
  release:
    jobs:
      - release-image:
          context: apsystems-github-publish
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
