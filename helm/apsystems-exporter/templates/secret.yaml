{{- if and .Values.apsystems.createSecret (not .Values.apsystems.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "apsystems-exporter.fullname" . }}
  labels:
    {{- include "apsystems-exporter.labels" . | nindent 4 }}
type: Opaque
stringData:
  app-id: {{ required "apsystems.appId is required when createSecret is true" .Values.apsystems.appId | quote }}
  app-secret: {{ required "apsystems.appSecret is required when createSecret is true" .Values.apsystems.appSecret | quote }}
{{- end }}
